name: Post Events

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run the bot without posting or saving state"
        type: boolean
        default: false

concurrency:
  group: post-events
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          install: true
          cache: true

      - run: pnpm install --frozen-lockfile

      # Keep going on failure so any ids already saved by the bot still get
      # pushed to main; otherwise a mid-loop crash drops the runner FS and
      # the next cron tick re-posts already-delivered events. The final step
      # below restores the failure so scheduled runs surface as failed.
      - run: pnpm start
        id: bot
        continue-on-error: true
        env:
          BSKY_HANDLE: ${{ secrets.BSKY_HANDLE }}
          BSKY_APP_PASSWORD: ${{ secrets.BSKY_APP_PASSWORD }}
          CONNPASS_API_KEY: ${{ secrets.CONNPASS_API_KEY }}
          DRY_RUN: ${{ inputs.dry_run && '1' || '0' }}

      - name: Check for posted-events.json changes
        id: changes
        run: |
          if [ -n "$(git status --porcelain posted-events.json)" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        if: steps.changes.outputs.changed == 'true'
        id: app-token
        with:
          client-id: ${{ secrets.BOT_CLIENT_ID }}
          private-key: ${{ secrets.BOT_PRIVATE_KEY }}

      - name: Resolve bot user id
        if: steps.changes.outputs.changed == 'true'
        id: bot-user
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          slug='${{ steps.app-token.outputs.app-slug }}'
          id=$(gh api "/users/${slug}[bot]" --jq .id)
          echo "id=${id}" >> "$GITHUB_OUTPUT"
          echo "slug=${slug}" >> "$GITHUB_OUTPUT"

      - name: Commit and push posted-events.json
        if: steps.changes.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          git config user.name '${{ steps.bot-user.outputs.slug }}[bot]'
          git config user.email '${{ steps.bot-user.outputs.id }}+${{ steps.bot-user.outputs.slug }}[bot]@users.noreply.github.com'
          git add posted-events.json
          git commit -m "chore: update posted-events.json"
          auth_header="AUTHORIZATION: basic $(printf 'x-access-token:%s' "$GH_TOKEN" | base64 -w 0)"

          # Retry with rebase so a concurrent push to main does not lose
          # the just-recorded posted ids (their absence would re-post events).
          attempts=0
          max=3
          until git -c "http.https://github.com/.extraheader=${auth_header}" push; do
            attempts=$((attempts + 1))
            if [ "$attempts" -ge "$max" ]; then
              echo "git push failed after $attempts attempts" >&2
              exit 1
            fi
            echo "git push failed (attempt $attempts); pulling --rebase before retry" >&2
            git -c "http.https://github.com/.extraheader=${auth_header}" pull --rebase origin main
            sleep 2
          done

      - name: Re-fail job if bot run failed
        if: steps.bot.outcome == 'failure'
        run: |
          echo "pnpm start failed; see the bot step above for details" >&2
          exit 1
