name: Post Events

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run the bot without posting or saving state"
        type: boolean
        default: false

concurrency:
  group: post-events
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          install: true
          cache: true
      - run: pnpm install --frozen-lockfile
      - run: pnpm start
        env:
          BSKY_HANDLE: ${{ secrets.BSKY_HANDLE }}
          BSKY_APP_PASSWORD: ${{ secrets.BSKY_APP_PASSWORD }}
          CONNPASS_API_KEY: ${{ secrets.CONNPASS_API_KEY }}
          DRY_RUN: ${{ inputs.dry_run && '1' || '0' }}
      - name: Commit posted-events.json if changed
        run: |
          if [ -n "$(git status --porcelain posted-events.json)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add posted-events.json
            git commit -m "chore: update posted-events.json"
            git push
          fi
